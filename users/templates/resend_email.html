<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resend Verification Email</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --accent: #4f46e5;
            --muted: #6b7280;
            --input-border: #e6e9f2;
            --shadow: 0 6px 24px rgba(31, 41, 55, 0.08);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: linear-gradient(180deg, var(--bg), #eef2ff);
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 28px;
            box-sizing: border-box;
            border: 1px solid var(--input-border);
        }

        .brand {
            text-align: center;
            margin-bottom: 18px;
        }
        .brand h1 {
            margin: 0;
            font-size: 20px;
            color: #0f172a;
            letter-spacing: -0.2px;
        }
        .lead {
            margin: 10px 0 20px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        form label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--input-border);
            background: #fff;
            box-sizing: border-box;
            font-size: 14px;
            color: #0f172a;
            outline: none;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        input:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.06);
            border-color: var(--accent);
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px 12px;
            margin-top: 16px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
        }

        .btn:active { transform: translateY(1px); }

        .meta {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted);
        }

        .meta a {
            color: var(--accent);
            text-decoration: none;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #22c55e;
        }

        .verified {
            background: #dbeafe;
            color: #1e40af;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <main class="card" role="main">
            <div class="brand">
                <h1>Resend Verification Email</h1>
                <p class="lead">Enter your email to receive a verification link</p>
            </div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            {% if success %}
                <div class="success">{{ message }}</div>
                <p class="meta"><a href="{% url 'login' %}">Back to Login</a></p>
            {% elif verified %}
                <div class="verified">{{ message }}</div>
                <p class="meta"><a href="{% url 'login' %}">Go to Login</a></p>
            {% else %}
                <form method="post" action="{% url 'resend-verification' %}">
                    {% csrf_token %}
                    <label for="email">Email Address</label>
                    <input 
                        id="email" 
                        name="email" 
                        type="email" 
                        required
                        placeholder="your-email@example.com"
                    />

                    <button class="btn" type="submit">Resend Verification Email</button>

                    <p class="meta">
                        Remember your password? <a href="{% url 'login' %}">Go to Login</a>
                    </p>
                </form>
            {% endif %}
        </main>
    </div>
</body>
</html>

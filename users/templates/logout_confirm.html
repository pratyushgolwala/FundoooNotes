<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
        }
        button, a {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        .btn-logout {
            background: #dc2626;
            color: white;
        }
        .btn-logout:hover {
            background: #b91c1c;
        }
        .btn-cancel {
            background: #f5f7fa;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-cancel:hover {
            background: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚪 Logout?</h1>
        <p>Are you sure you want to logout?</p>
        
        <form method="post" style="display: inline-block; width: 100%;">
            {% csrf_token %}
            <div class="btn-group">
                <button type="submit" class="btn-logout">Yes, Logout</button>
                {% if user %}
                    <a href="{% url 'home' user.id %}" class="btn-cancel">Cancel</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn-cancel">Cancel</a>
                {% endif %}
            </div>
        </form>
    </div>
</body>
</html>

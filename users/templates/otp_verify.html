<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify OTP</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --accent: #4f46e5;
        --muted: #6b7280;
        --input-border: #e6e9f2;
        --shadow: 0 6px 24px rgba(31, 41, 55, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Roboto, sans-serif;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, var(--bg), #eef2ff);
        -webkit-font-smoothing: antialiased;
      }

      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 40px;
        box-sizing: border-box;
      }
      
      .icon {
        width: 72px;
        height: 72px;
        background: #e0e7ff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 20px;
      }

      .brand {
        text-align: center;
        margin-bottom: 24px;
      }
      .brand h1 {
        margin: 0;
        font-size: 22px;
        color: #0f172a;
      }
      .lead {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      form label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input[type="text"], input[type="email"] {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        box-sizing: border-box;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
      }
      
      .otp-input {
        letter-spacing: 8px;
        font-family: monospace;
        font-size: 24px !important;
        text-align: center;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 24px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
        transition: background 0.2s;
      }

      .btn:hover { background: #4338ca; }
      
      .resend-btn {
        background: transparent;
        color: var(--accent);
        border: 2px solid rgba(79, 70, 229, 0.2);
        margin-top: 12px;
      }
      .resend-btn:hover {
        background: rgba(79, 70, 229, 0.05);
      }

      .error {
        background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; text-align: center;
      }
      .success {
        background: #dcfce7; color: #166534; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="icon">🔢</div>
        <div class="brand">
          <h1>Two-Factor Login</h1>
          <p class="lead">We sent a 6-digit code to your email.</p>
        </div>

        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">{{ success }}</div>{% endif %}
        {% if message %}<div class="success">{{ message }}</div>{% endif %}

        <form method="post" action="{% url 'verify-otp' %}">
          {% csrf_token %}
          <div style="margin-bottom: 16px;">
            <label>Email address</label>
            <input type="email" name="email" value="{{ email|default_if_none:'' }}" placeholder="you@example.com" required {% if email %}readonly style="background: #f9fafb; color: #6b7280; cursor: not-allowed;"{% endif %} />
          </div>
          
          <div>
            <label>6-digit code</label>
            <input class="otp-input" type="text" name="otp" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus />
          </div>

          <button class="btn" type="submit">Complete Login</button>
        </form>

        <form method="post" action="{% url 'resend-otp' %}">
          {% csrf_token %}
          <input type="hidden" name="email" value="{{ email|default_if_none:'' }}" />
          {% if email %}
          <button class="btn resend-btn" type="submit">Resend Code</button>
          {% endif %}
        </form>
        
        <div class="brand" style="margin-top: 24px;">
           <a href="{% url 'login' %}" style="color: var(--accent); font-size: 14px; text-decoration: none; font-weight: 500;">Back to login</a>
        </div>
      </div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Email Verified</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --accent: #4f46e5;
            --muted: #6b7280;
            --shadow: 0 6px 24px rgba(31, 41, 55, 0.08);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
        }

        html, body {
            height: 100%;
            margin: 0;
            background: linear-gradient(180deg, var(--bg), #eef2ff);
            -webkit-font-smoothing: antialiased;
        }

        .wrap {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
        }

        .card {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: var(--shadow);
            padding: 40px;
            box-sizing: border-box;
            border: 1px solid #e6e9f2;
            text-align: center;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .icon.success { font-size: 60px; }
        .icon.error { font-size: 60px; }

        .card h1 {
            margin: 0 0 12px;
            font-size: 24px;
            color: #0f172a;
        }

        .message {
            font-size: 15px;
            line-height: 1.6;
            margin: 16px 0 24px;
        }

        .success-message {
            color: #166534;
        }

        .error-message {
            color: #991b1b;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
            margin-top: 16px;
        }

        .btn:hover {
            opacity: 0.95;
        }

        .meta {
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
        }

        .meta a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <main class="card">
            {% if error %}
                <div class="icon error">❌</div>
                <h1>Verification Failed</h1>
                <p class="message error-message">{{ message }}</p>
                <p class="meta">
                    <a href="{% url 'resend-verification' %}">Resend verification email</a> or 
                    <a href="{% url 'signup' %}">create a new account</a>
                </p>
            {% else %}
                <div class="icon success">✅</div>
                <h1>Email Verified!</h1>
                <p class="message success-message">{{ message }}</p>
                <a href="{% url 'login' %}" class="btn">Go to Login</a>
                <p class="meta">Use your credentials to sign in</p>
            {% endif %}
        </main>
    </div>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --accent: #4f46e5;
        --muted: #6b7280;
        --input-border: #e6e9f2;
        --shadow: 0 6px 24px rgba(31, 41, 55, 0.08);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: linear-gradient(180deg, var(--bg), #eef2ff);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border-radius: 12px;
        box-shadow: var(--shadow);
        padding: 28px;
        box-sizing: border-box;
        border: 1px solid var(--input-border);
      }

      .brand {
        text-align: center;
        margin-bottom: 18px;
      }
      .brand h1 {
        margin: 0;
        font-size: 20px;
        color: #0f172a;
        letter-spacing: -0.2px;
      }
      .lead {
        margin: 10px 0 20px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
      }

      form label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input[type="text"],
      input[type="password"],
      input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--input-border);
        background: #fff;
        box-sizing: border-box;
        font-size: 14px;
        color: #0f172a;
        outline: none;
        transition:
          box-shadow 0.15s,
          border-color 0.15s;
      }

      input:focus {
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.06);
        border-color: var(--accent);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }

      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .btn {
        display: inline-block;
        width: 100%;
        padding: 10px 12px;
        margin-top: 14px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
        font-size: 15px;
      }

      .btn:active {
        transform: translateY(1px);
      }

      .meta {
        text-align: center;
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
      }

      .meta a {
        color: var(--accent);
        text-decoration: none;
      }

      .error {
        background: #fee2e2;
        color: #991b1b;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
        border-left: 4px solid #dc2626;
      }

      .demo-info {
        background: #eff6ff;
        color: #1e40af;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 13px;
        border-left: 4px solid #3b82f6;
      }

      .demo-info strong {
        color: #1e3a8a;
      }

      @media (max-width: 420px) {
        .card {
          padding: 20px;
          border-radius: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card" role="main" aria-labelledby="signin-title">
        <div class="brand">
          <h1 id="signin-title">Sign in to your account</h1>
          <p class="lead">Enter your credentials to access your account.</p>
        </div>
        {% if email_pending %}
        <div class="error">
          Email not verified yet. Please check {{ email_pending }} for the
          verification link.
          <a
            href="{% url 'resend-verification' %}"
            style="color: inherit; text-decoration: underline"
            >Resend email?</a
          >
        </div>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <label for="username">Username or Email</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />

          <label for="password" style="margin-top: 12px">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <div class="row">
            <div>
              <a href="/forgot" style="font-size: 13px; color: var(--accent)"
                >Forgot Password?</a
              >
            </div>
          </div>

          <button class="btn" type="submit">Log in</button>

          <p class="meta">
            Don't have an account? <a href="/signup">Sign up</a>
          </p>
        </form>
      </main>
    </div>
  </body>
</html>

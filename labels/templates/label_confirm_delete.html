<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Label</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        form { margin-top: 20px; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; }
        .btn-delete { background: #dc2626; color: white; border: none; border-radius: 4px; }
        .btn-cancel { background: #999; color: white; border: none; border-radius: 4px; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Label?</h1>
        <p><strong>{{ label.name }}</strong></p>
        <p>Are you sure you want to delete this label?</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Delete</button>
            <a href="{% url 'labels-list' user.id %}" class="btn-cancel">Cancel</a>
        </form>
    </div>
</body>
</html>

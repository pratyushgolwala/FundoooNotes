<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Labels</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        a { color: #4f46e5; text-decoration: none; margin-right: 10px; }
        .btn { padding: 8px 16px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .label-item { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Labels</h1>
        <p>User: {{ user.name }}</p>
        <a href="{% url 'home' user.id %}">← Back</a>
        <a href="{% url 'label-create' user.id %}" class="btn">+ New Label</a>
        
        {% if labels %}
            {% for label in labels %}
                <div class="label-item">
                    <h3>{{ label.name }}</h3>
                    <a href="{% url 'label-update' user.id label.id %}">Edit</a> |
                    <a href="{% url 'label-delete' user.id label.id %}">Delete</a>
                </div>
            {% endfor %}
        {% else %}
            <p>No labels yet.</p>
        {% endif %}
    </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .note { border: 1px solid #e5e7eb; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
    .actions a, .actions form { display: inline-block; margin-right: 8px; }
    .btn { padding: 6px 10px; border-radius: 6px; background:#3b82f6; color:#fff; text-decoration:none; }
    .btn-danger { background:#ef4444; }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h1>{{ user.name }}'s Notes</h1>
    <a class="btn" href="{% url 'logout' %}">Logout</a>
  </div>
  <p><a class="btn" href="{% url 'note-create' user_id=user.id %}">+ Create Note</a></p>

  {% if notes %}
    {% for note in notes %}
      <div class="note">
        <h3>{{ note.title }}</h3>
        <p>{{ note.content }}</p>
        <div class="actions">
          <a class="btn" href="{% url 'note-update' user_id=user.id note_id=note.id %}">Edit</a>
          <form method="post" action="{% url 'note-delete' user_id=user.id note_id=note.id %}">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Delete</button>
          </form>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No notes yet.</p>
  {% endif %}
</body>
</html>
